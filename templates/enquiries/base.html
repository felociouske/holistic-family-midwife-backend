<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Holistic Family Midwife{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333333;
            background-color: #f4f4f4;
        }
        
        .email-wrapper {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
        }
        
        .email-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            text-align: center;
        }
        
        .email-header h1 {
            color: #ffffff;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .email-header p {
            color: #e0e7ff;
            font-size: 14px;
        }
        
        .email-content {
            padding: 40px 30px;
        }
        
        .greeting {
            font-size: 18px;
            color: #1f2937;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .message {
            color: #4b5563;
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 25px;
        }
        
        .info-box {
            background-color: #f9fafb;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin: 25px 0;
            border-radius: 4px;
        }
        
        .info-box h3 {
            color: #1f2937;
            font-size: 16px;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .info-item {
            display: flex;
            padding: 8px 0;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .info-item:last-child {
            border-bottom: none;
        }
        
        .info-label {
            font-weight: 600;
            color: #374151;
            min-width: 140px;
            font-size: 14px;
        }
        
        .info-value {
            color: #6b7280;
            font-size: 14px;
        }
        
        .cta-button {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
            padding: 14px 32px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            margin: 25px 0;
            transition: transform 0.2s;
        }
        
        .cta-button:hover {
            transform: translateY(-2px);
        }
        
        .contact-info {
            background-color: #f0f4ff;
            padding: 20px;
            border-radius: 8px;
            margin: 25px 0;
        }
        
        .contact-info h4 {
            color: #1f2937;
            font-size: 15px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        
        .contact-item {
            color: #4b5563;
            font-size: 14px;
            margin: 8px 0;
            display: flex;
            align-items: center;
        }
        
        .contact-item strong {
            min-width: 60px;
            color: #374151;
        }
        
        .email-footer {
            background-color: #1f2937;
            color: #9ca3af;
            padding: 30px;
            text-align: center;
            font-size: 13px;
        }
        
        .email-footer p {
            margin: 8px 0;
        }
        
        .email-footer a {
            color: #a78bfa;
            text-decoration: none;
        }
        
        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, #e5e7eb, transparent);
            margin: 30px 0;
        }
        
        @media only screen and (max-width: 600px) {
            .email-header {
                padding: 30px 20px;
            }
            
            .email-header h1 {
                font-size: 24px;
            }
            
            .email-content {
                padding: 30px 20px;
            }
            
            .info-item {
                flex-direction: column;
            }
            
            .info-label {
                margin-bottom: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="email-wrapper">
        <div class="email-header">
            <h1>🌸 Holistic Family Midwife</h1>
            <p>Compassionate Care for Every Journey</p>
        </div>
        
        <div class="email-content">
            {% block content %}{% endblock %}
        </div>
        
        <div class="email-footer">
            <p><strong>Holistic Family Midwife</strong></p>
            <p>Nairobi, Kenya</p>
            <p>Phone: +254 797 735 027</p>
            <p>Email: <a href="mailto:info@holisticfamilymidwife.com">info@holisticfamilymidwife.com</a></p>
            <p style="margin-top: 20px; color: #6b7280; font-size: 12px;">
                © 2024 Holistic Family Midwife. All rights reserved.
            </p>
        </div>
    </div>
</body>
</html>
